services:
  api:
    build: .
    restart: unless-stopped
    environment:
      PORT: "3001"
      OLLAMA_URL: "http://ollama:11434"
    networks:
      - internal
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - internal
    # ── GPU support ─────────────────────────────────────────────────────────
    # Uncomment for NVIDIA GPU (requires nvidia-container-toolkit on the host):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}
    networks:
      - internal

networks:
  internal:

volumes:
  caddy_data:
  caddy_config:
  ollama_data:
